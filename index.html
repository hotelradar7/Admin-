<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HotelRadar Admin</title>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1C1B1A;--ink-soft:#5C5955;--ink-faint:#948F89;
  --paper:#F8F7F4;--paper-dim:#F0EDE7;--card:#FFFFFF;--line:#E7E2D9;
  --accent:#E8631C;--accent-dim:#FCE8DB;--accent-ink:#7A350F;
  --good:#1F7A4D;--good-dim:#E1F3E9;
  --blue:#2563EB;--blue-dim:#EFF6FF;
  --purple:#7C3AED;--purple-dim:#F5F3FF;
  --r-sm:10px;--r-md:14px;--r-lg:20px;
  --sh1:0 1px 3px rgba(28,27,26,.07);
  --sh2:0 4px 16px rgba(28,27,26,.09);
  --sh3:0 12px 32px rgba(28,27,26,.14);
  --nav:220px;
}
html{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:700;line-height:1.25;}
button,input,select,textarea{font-family:inherit;font-size:14px;border:none;outline:none;}
button{cursor:pointer;background:none;-webkit-tap-highlight-color:transparent;}
.ns::-webkit-scrollbar{display:none;}
.ns{-ms-overflow-style:none;scrollbar-width:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{animation:spin .7s linear infinite;display:inline-block;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fi .2s ease-out forwards;}
/* Layout */
.sidebar{width:var(--nav);background:var(--card);border-right:1px solid var(--line);position:fixed;top:0;left:0;height:100vh;z-index:30;display:flex;flex-direction:column;overflow-y:auto;}
.main{margin-left:var(--nav);min-height:100vh;display:flex;flex-direction:column;}
@media(max-width:680px){.sidebar{display:none;}.main{margin-left:0;}}
.topbar{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh1);}
.content{padding:20px;flex:1;max-width:960px;}
/* Nav */
.ni{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:12.5px;font-weight:600;color:var(--ink-soft);border-radius:8px;margin:2px 8px;cursor:pointer;transition:all .12s;}
.ni:hover{background:var(--paper-dim);color:var(--ink);}
.ni.on{background:var(--accent-dim);color:var(--accent);}
.ni .bdg{margin-left:auto;background:#EF4444;color:#fff;font-size:9px;font-weight:900;padding:1px 5px;border-radius:999px;min-width:16px;text-align:center;}
/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--sh1);}
.scard{padding:16px;display:flex;flex-direction:column;gap:3px;}
.sval{font-size:26px;font-weight:700;font-family:'Fraunces',serif;}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);}
/* Inputs */
.inp{width:100%;padding:9px 12px;background:var(--paper-dim);border:1px solid var(--line);border-radius:var(--r-sm);font-size:13px;color:var(--ink);transition:border .15s;}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim);}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--r-sm);font-size:12.5px;font-weight:700;cursor:pointer;transition:all .12s;border:none;}
.btn:active{transform:scale(.97);}
.ba{background:var(--accent);color:#fff;}
.bg{background:var(--good);color:#fff;}
.bb{background:var(--blue);color:#fff;}
.br{background:#EF4444;color:#fff;}
.bo{background:var(--card);color:var(--ink-soft);border:1px solid var(--line);}
.bo:hover{background:var(--paper-dim);}
/* Badges */
.b{display:inline-block;padding:2px 7px;border-radius:999px;font-size:9.5px;font-weight:800;text-transform:uppercase;}
.bg2{background:var(--good-dim);color:var(--good);}
.br2{background:#FEE2E2;color:#DC2626;}
.ba2{background:#FEF3C7;color:#92400E;}
.bb2{background:var(--blue-dim);color:var(--blue);}
.bp2{background:var(--purple-dim);color:var(--purple);}
.bx{background:var(--paper-dim);color:var(--ink-faint);}
/* Toggle */
.tog{width:40px;height:22px;background:var(--line);border-radius:999px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;}
.tog.on{background:var(--good);}
.tog::after{content:'';width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog.on::after{transform:translateX(18px);}
/* Chip */
.chip{padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:var(--paper-dim);color:var(--ink-soft);font-size:11px;font-weight:700;cursor:pointer;transition:all .1s;}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);border-bottom:1px solid var(--line);background:var(--paper-dim);}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--line);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--paper-dim);}
/* Overlay */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px 14px;}
/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:520px){.g3{grid-template-columns:repeat(4,1fr);}}
/* Tabs (small admin) */
.tab-row{display:flex;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--card);padding:0 10px;}
.tab-row::-webkit-scrollbar{display:none;}
.tbtn{padding:11px 13px;font-size:12px;font-weight:700;border-bottom:2px solid transparent;color:var(--ink-soft);white-space:nowrap;cursor:pointer;transition:all .12s;}
.tbtn.on{border-color:var(--accent);color:var(--accent);}
/* Plan banners */
.pl-free{background:var(--good-dim);border:1px solid #86EFAC;}
.pl-paid{background:var(--blue-dim);border:1px solid #BFDBFE;}
.pl-exp{background:#FEF2F2;border:1px solid #FECACA;}
.pl-ban{padding:12px 16px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
/* Link box */
.link-box{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--paper-dim);border:1px solid var(--line);border-radius:var(--r-sm);font-size:12px;font-family:monospace;word-break:break-all;color:var(--ink);}
/* Review */
.rv{padding:14px;border-bottom:1px solid var(--line);}
.rv:last-child{border-bottom:none;}
.stars{color:#F59E0B;}
</style>
</head>

<script>
// ═══════════════════════ CONFIG ═══════════════════════
const FB={apiKey:"AIzaSyDoBNdJEAos6Ofj-KDzvarg_mH1Nz3nQls",authDomain:"hotel-radar-india.firebaseapp.com",databaseURL:"https://hotel-radar-india-default-rtdb.firebaseio.com",projectId:"hotel-radar-india",storageBucket:"hotel-radar-india.firebasestorage.app",messagingSenderId:"492786665359",appId:"1:492786665399:web:7033614463c044cf4fadfa"};
const SUPER_EMAIL="hotelradar.admin@gmail.com";
const AMENITIES=["AC","WiFi","Restaurant","Parking","Pool","Gym","Spa","Ganga View","Mountain View","Room Service","Laundry","Couple Friendly","Family Friendly","Hot Water","TV","Mini Bar","Balcony","Garden","Airport Shuttle","24/7 Reception"];
// Detect mode from URL
const URL_PARAMS=new URLSearchParams(location.search);
const HOTEL_EMAIL=URL_PARAMS.get('admin'); // ?admin=email → small panel
const IS_HOTEL_MODE=!!HOTEL_EMAIL;

// ═══════════════════════ STATE ═══════════════════════
let S={
  // auth
  authReady:false,isAuth:false,user:null,
  // super admin data
  hotels:[],sharedAdmins:[],payments:[],bookings:[],reviews:[],searchLogs:[],
  // hotel admin data
  myAdminData:null,myHotel:null,myBookings:[],myReviews:[],
  // ui
  tab:'dashboard',loading:true,
  // forms
  showAddHotel:false,editHotel:null,hForm:eHotel(),hFormErr:'',hFormSaving:false,amenityInput:'',
  showShare:false,shareEmail:'',shareErr:'',shareSaving:false,generatedLink:'',
  showPayment:false,payOpt:'monthly',
  deleteId:null,deleteType:'',
  // login
  lEmail:'',lPass:'',lErr:'',lLoading:false,lShowPass:false,gLoad:false,
  toast:null,
};
function eHotel(){return{name:'',city:'',state:'',area:'',pin:'',phone:'',type:'hotel',price:'',rating:'4.5',reviewCount:'0',checkIn:'12:00 PM',checkOut:'11:00 AM',plan:'basic',emoji:'🏨',gradient:'linear-gradient(135deg,#E8631C,#F2A65A)',desc:'',amenities:[],badges:[],approved:false,active:true};}
function set(p){S={...S,...p};render();}
function sf(p){set({hForm:{...S.hForm,...p}});}

// ═══════════════════════ FIREBASE ═══════════════════════
let db=null;
function initFB(){
  if(!firebase.apps.length)firebase.initializeApp(FB);
  db=firebase.database();
  firebase.auth().onAuthStateChanged(async u=>{
    if(!u){set({authReady:true,isAuth:false});return;}
    if(IS_HOTEL_MODE){
      // Small admin panel — check if this user's email matches HOTEL_EMAIL param
      const email=u.email;
      const expectedEmail=decodeURIComponent(HOTEL_EMAIL);
      if(email.toLowerCase()!==expectedEmail.toLowerCase()){
        await firebase.auth().signOut();
        set({authReady:true,isAuth:false,lErr:`This panel is for ${expectedEmail}. Please sign in with that Google account.`});
        return;
      }
      const key=email.replace(/\./g,'_');
      const snap=await db.ref(`sharedAdmins/${key}`).get();
      if(!snap.exists()){
        await firebase.auth().signOut();
        set({authReady:true,isAuth:false,lErr:'Access not granted. Contact HotelRadar admin.'});
        return;
      }
      const adminData=snap.val();
      set({authReady:true,isAuth:true,user:u,myAdminData:{...adminData,key}});
      loadHotelMode(email,key,adminData);
    } else {
      // Super admin panel
      if(u.email!==SUPER_EMAIL){await firebase.auth().signOut();set({authReady:true,isAuth:false,lErr:'Access denied. Super Admin only.'});return;}
      set({authReady:true,isAuth:true,user:u});
      loadSuperMode();
    }
  });
}

function loadSuperMode(){
  db.ref('hotels').on('value',s=>{const d=s.val();if(!d){set({hotels:[],loading:false});return;}const l=Array.isArray(d)?d.filter(Boolean):Object.keys(d).map(k=>({...d[k],id:d[k].id||k}));set({hotels:l,loading:false});});
  db.ref('sharedAdmins').on('value',s=>{const d=s.val();if(!d){set({sharedAdmins:[]});return;}set({sharedAdmins:Object.keys(d).map(k=>({...d[k],key:k}))});});
  db.ref('payments').on('value',s=>{const d=s.val();if(!d){set({payments:[]});return;}set({payments:Object.keys(d).map(k=>({...d[k],id:k}))});});
  db.ref('bookings').on('value',s=>{const d=s.val();if(!d){set({bookings:[]});return;}set({bookings:Object.keys(d).map(k=>({...d[k],id:k}))});});
  db.ref('searchLogs').limitToLast(300).on('value',s=>{const d=s.val();if(!d){set({searchLogs:[]});return;}set({searchLogs:Object.keys(d).map(k=>({...d[k],id:k})).reverse()});});
}

function loadHotelMode(email,key,adminData){
  db.ref('hotels').on('value',s=>{
    const d=s.val();if(!d){set({myHotel:null,loading:false});return;}
    const all=Array.isArray(d)?d.filter(Boolean):Object.keys(d).map(k=>({...d[k],id:d[k].id||k}));
    const mine=all.find(h=>h.ownerEmail===email||h.id===adminData.hotelId)||null;
    set({myHotel:mine,loading:false,hForm:mine?{...mine,price:String(mine.price||''),rating:String(mine.rating||'4.5'),reviewCount:String(mine.reviewCount||0)}:eHotel()});
  });
  db.ref('bookings').on('value',s=>{
    const d=s.val();if(!d){set({myBookings:[]});return;}
    const all=Object.keys(d).map(k=>({...d[k],id:k}));
    set({myBookings:all.filter(b=>b.hotelId===adminData.hotelId||b.ownerEmail===email)});
  });
  const hKey=adminData.hotelId||key;
  db.ref(`reviews/${hKey}`).on('value',s=>{
    const d=s.val();if(!d){set({myReviews:[]});return;}
    set({myReviews:Object.keys(d).map(k=>({...d[k],id:k})).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))});
  });
}

// Auth actions
async function doLogin(){
  if(S.lLoading)return;set({lLoading:true,lErr:''});
  try{await firebase.auth().signInWithEmailAndPassword(S.lEmail,S.lPass);}
  catch(e){const c=e.code||'';set({lLoading:false,lErr:c==='auth/wrong-password'||c==='auth/user-not-found'||c==='auth/invalid-credential'?'Invalid credentials.':e.message||'Login failed.'});}
}
async function doGoogle(){
  set({gLoad:true,lErr:''});
  try{const p=new firebase.auth.GoogleAuthProvider();p.setCustomParameters({prompt:'select_account'});await firebase.auth().signInWithPopup(p);}
  catch(e){set({gLoad:false,lErr:'Google sign-in failed.'});}
}
async function doSignOut(){await firebase.auth().signOut();set({isAuth:false,user:null,tab:'dashboard'});}

// Hotel ops
async function saveHotel(){
  if(!S.hForm.name?.trim()){set({hFormErr:'Hotel name required'});return;}
  if(!S.hForm.city?.trim()){set({hFormErr:'City required'});return;}
  if(!S.hForm.phone?.trim()){set({hFormErr:'Phone required'});return;}
  if(!S.hForm.price||Number(S.hForm.price)<=0){set({hFormErr:'Valid price required'});return;}
  set({hFormSaving:true,hFormErr:''});
  try{
    const existId=S.editHotel?.id||(IS_HOTEL_MODE?S.myAdminData?.hotelId:null);
    const id=existId||('h'+Date.now());
    const h={...S.hForm,id,price:Number(S.hForm.price)||0,rating:Number(S.hForm.rating)||4.5,reviewCount:Number(S.hForm.reviewCount)||0,createdAt:existId?(S.editHotel?.createdAt||new Date().toISOString()):new Date().toISOString()};
    if(IS_HOTEL_MODE){h.ownerEmail=S.user.email;await db.ref(`sharedAdmins/${S.myAdminData.key}`).update({hotelId:id});}
    await db.ref(`hotels/${id}`)[existId?'update':'set'](h);
    toast(existId?'Hotel updated!':'Hotel added!');
    set({showAddHotel:false,editHotel:null,hFormSaving:false});
  }catch(e){set({hFormErr:e.message||'Save failed',hFormSaving:false});}
}
async function delHotel(id){await db.ref(`hotels/${id}`).remove();set({deleteId:null});toast('Deleted.');}
async function togField(id,f,v){await db.ref(`hotels/${id}`).update({[f]:v});}

// Share admin
async function shareAdmin(){
  const email=S.shareEmail.trim().toLowerCase();
  if(!email.includes('@')){set({shareErr:'Enter valid Gmail.'});return;}
  if(S.sharedAdmins.find(a=>a.email===email)){set({shareErr:'Already has access.'});return;}
  set({shareSaving:true,shareErr:''});
  try{
    const key=email.replace(/\./g,'_');
    await db.ref(`sharedAdmins/${key}`).set({email,addedAt:new Date().toISOString(),addedBy:S.user.email,active:true,plan:'free',planExpiry:new Date(Date.now()+30*864e5).toISOString()});
    // Generate link
    const link=`${location.origin}${location.pathname}?admin=${encodeURIComponent(email)}`;
    set({shareSaving:false,shareEmail:'',generatedLink:link});
    toast('Access shared! Link generated.');
  }catch(e){set({shareSaving:false,shareErr:e.message||'Failed.'});}
}
async function revokeAdmin(key){await db.ref(`sharedAdmins/${key}`).remove();toast('Access revoked.');}
async function markPaid(key){
  const expiry=new Date(Date.now()+30*864e5).toISOString();
  const now=new Date().toISOString();
  await db.ref(`sharedAdmins/${key}`).update({plan:'paid',planExpiry:expiry,lastPaid:now});
  await db.ref(`payments/pay_${Date.now()}`).set({adminEmail:key,amount:999,date:now,status:'paid',plan:'monthly'});
  toast('Payment marked. Plan extended 30 days.');
}
async function delReview(id){
  const k=S.myAdminData.hotelId||S.myAdminData.key;
  await db.ref(`reviews/${k}/${id}`).remove();
  set({deleteId:null,deleteType:''});toast('Review removed.');
}
async function updBooking(id,status){await db.ref(`bookings/${id}`).update({status});toast('Booking '+status+'!');}
async function delBooking(id){await db.ref(`bookings/${id}`).remove();set({deleteId:null,deleteType:''});toast('Booking removed.');}

// ═══════════════════════ UTILS ═══════════════════════
function toast(msg,t='success'){set({toast:{msg,t}});setTimeout(()=>set({toast:null}),3500);}
function el(tag,a,...c){
  const e=document.createElement(tag);
  if(a)Object.keys(a).forEach(k=>{
    if(k==='class')e.className=a[k];
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),a[k]);
    else if(k==='style'&&typeof a[k]==='object')Object.assign(e.style,a[k]);
    else if(['checked','disabled','selected','value'].includes(k))e[k]=a[k];
    else e.setAttribute(k,a[k]);
  });
  c.flat(9).forEach(ch=>{if(ch==null||ch===false)return;e.appendChild(typeof ch==='string'||typeof ch==='number'?document.createTextNode(String(ch)):ch);});
  return e;
}
function svg(paths,sz=16){
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  ['width','height'].forEach(a=>s.setAttribute(a,sz));
  s.setAttribute('viewBox','0 0 24 24');s.setAttribute('fill','none');
  s.setAttribute('stroke','currentColor');s.setAttribute('stroke-width','2');
  s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');
  paths.forEach(d=>{const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);s.appendChild(p);});
  return s;
}

function getTopQ(){
  const c={};
  S.searchLogs.forEach(l=>{if(l.query)c[l.query]=(c[l.query]||0)+1;});
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).map(([q,count])=>({q,c:count}));
}

function getMyPlan(){
  const a=S.myAdminData;if(!a)return{st:'none',label:'No Plan',days:0};
  if(!a.planExpiry)return{st:'free',label:'Free Trial',days:30};
  const days=Math.ceil((new Date(a.planExpiry)-new Date())/(864e5));
  if(days<=0)return{st:'expired',label:'Expired',days:0};
  return{st:a.plan==='paid'?'paid':'free',label:a.plan==='paid'?'Paid Plan':'Free Trial',days};
}

// ═══════════════════════ TOAST ═══════════════════════
function renderToast(){
  if(!S.toast)return null;
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${S.toast.t==='error'?'#EF4444':'#1F7A4D'};color:#fff;padding:9px 18px;border-radius:999px;font-size:12px;font-weight:700;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap`;
  d.textContent=S.toast.msg;return d;
}

// ═══════════════════════ MAIN RENDER ═══════════════════════
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(!S.authReady){const d=document.createElement('div');d.style.cssText='min-height:100vh;display:flex;align-items:center;justify-content:center;';d.appendChild(sp2());app.appendChild(d);return;}
  if(!S.isAuth){app.appendChild(renderLogin());if(S.toast)app.appendChild(renderToast());return;}

  if(IS_HOTEL_MODE){
    // SMALL HOTEL PANEL
    app.appendChild(renderTopbar());
    app.appendChild(el('div',{class:'tab-row'},
      ...[{id:'dashboard',l:'📊 Dashboard'},{id:'hotel',l:'🏨 My Hotel'},{id:'bookings',l:'📅 Bookings'},{id:'reviews',l:'⭐ Reviews'},{id:'plan',l:'💳 My Plan'},{id:'settings',l:'⚙️ Settings'}]
        .map(t=>el('div',{class:'tbtn'+(S.tab===t.id?' on':''),onClick:()=>set({tab:t.id})},t.l))
    ));
    if(S.tab==='dashboard')app.appendChild(renderDashboardH());
    else if(S.tab==='hotel')app.appendChild(renderHotelH());
    else if(S.tab==='bookings')app.appendChild(renderBookingsH());
    else if(S.tab==='reviews')app.appendChild(renderReviewsH());
    else if(S.tab==='plan')app.appendChild(renderPlanH());
    else if(S.tab==='settings')app.appendChild(renderSettingsH());
  } else {
    // SUPER ADMIN PANEL
    app.appendChild(el('div',{style:{display:'flex'}},
      renderSidebar(),
      el('div',{class:'main'},
        renderTopbar(),
        S.tab==='dashboard'?renderDashboardS():
        S.tab==='hotels'?renderHotelsS():
        S.tab==='payments'?renderPaymentsS():
        S.tab==='admins'?renderAdminsS():
        S.tab==='share'?renderShareS():
        S.tab==='analytics'?renderAnalyticsS():
        S.tab==='bookings'?renderBookingsS():
        S.tab==='activity'?renderActivityS():
        el('div',{class:'content'},'')
      )
    ));
  }
  // Modals
  if(S.showAddHotel||S.editHotel)app.appendChild(renderHotelForm());
  if(S.showShare)app.appendChild(renderShareModal());
  if(S.showPayment)app.appendChild(renderPaymentModal());
  if(S.deleteId)app.appendChild(renderConfirm());
  if(S.toast)app.appendChild(renderToast());
}

window.addEventListener('load',()=>{render();initFB();});
