<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HotelRadar Admin</title>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1C1B1A;--ink-s:#5C5955;--ink-f:#948F89;
  --paper:#F8F7F4;--pd:#F0EDE7;--card:#fff;--line:#E7E2D9;
  --ac:#E8631C;--acd:#FCE8DB;--aci:#7A350F;
  --good:#1F7A4D;--gd:#E1F3E9;
  --blue:#2563EB;--bd:#EFF6FF;
  --pur:#7C3AED;--purd:#F5F3FF;
  --r:10px;--r2:14px;--r3:20px;
  --s1:0 1px 3px rgba(28,27,26,.07);
  --s2:0 4px 16px rgba(28,27,26,.09);
  --s3:0 12px 32px rgba(28,27,26,.14);
}
html{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:15px;}
h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:700;line-height:1.25;}
button,input,select,textarea{font-family:inherit;font-size:14px;border:none;outline:none;}
button{cursor:pointer;background:none;-webkit-tap-highlight-color:transparent;}
.ns::-webkit-scrollbar{display:none;}.ns{-ms-overflow-style:none;scrollbar-width:none;}
@keyframes spin{to{transform:rotate(360deg);}}.spin{animation:spin .7s linear infinite;display:inline-block;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}.fi{animation:fi .2s ease-out;}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh;}

/* Desktop sidebar */
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--line);position:fixed;top:0;left:0;height:100vh;z-index:30;display:flex;flex-direction:column;overflow-y:auto;transition:transform .25s;}
.main{margin-left:220px;min-height:100vh;display:flex;flex-direction:column;}

/* Mobile bottom nav */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);z-index:40;padding:6px 0 8px;}
.mob-nav-inner{display:flex;overflow-x:auto;gap:2px;padding:0 4px;}
.mob-nav-inner::-webkit-scrollbar{display:none;}
.mni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:8px;cursor:pointer;flex-shrink:0;min-width:52px;transition:background .12s;}
.mni.on{background:var(--acd);}
.mni svg{color:var(--ink-f);}
.mni.on svg{color:var(--ac);}
.mni span{font-size:9px;font-weight:700;color:var(--ink-f);white-space:nowrap;}
.mni.on span{color:var(--ac);}

/* Mobile hamburger */
.mob-top{display:none;position:sticky;top:0;z-index:40;background:var(--card);border-bottom:1px solid var(--line);padding:11px 16px;align-items:center;justify-content:space-between;box-shadow:var(--s1);}

@media(max-width:700px){
  .sidebar{display:none;}
  .main{margin-left:0;padding-bottom:80px;}
  .mob-nav{display:block;}
  .mob-top{display:flex;}
}

.topbar{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--s1);}
@media(max-width:700px){.topbar{display:none;}}

.content{padding:16px;flex:1;max-width:960px;}

/* Sidebar nav item */
.ni{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:12.5px;font-weight:600;color:var(--ink-s);border-radius:8px;margin:2px 8px;cursor:pointer;transition:all .12s;}
.ni:hover{background:var(--pd);color:var(--ink);}
.ni.on{background:var(--acd);color:var(--ac);}
.ni .bdg{margin-left:auto;background:#EF4444;color:#fff;font-size:9px;font-weight:900;padding:1px 5px;border-radius:999px;}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);box-shadow:var(--s1);}
.scard{padding:16px;display:flex;flex-direction:column;gap:4px;}
.sval{font-size:24px;font-weight:700;font-family:'Fraunces',serif;}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-f);}

/* Inputs */
.inp{width:100%;padding:9px 12px;background:var(--pd);border:1px solid var(--line);border-radius:var(--r);font-size:13px;color:var(--ink);transition:border .15s;}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--acd);}
textarea.inp{resize:vertical;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--r);font-size:12.5px;font-weight:700;cursor:pointer;transition:all .12s;border:none;}
.btn:active{transform:scale(.97);}
.ba{background:var(--ac);color:#fff;}.ba:hover{opacity:.92;}
.bg{background:var(--good);color:#fff;}
.bb{background:var(--blue);color:#fff;}
.br{background:#EF4444;color:#fff;}
.bo{background:var(--card);color:var(--ink-s);border:1px solid var(--line);}
.bo:hover{background:var(--pd);}
.btn-w{width:100%;justify-content:center;}

/* Badges */
.b{display:inline-block;padding:2px 7px;border-radius:999px;font-size:9.5px;font-weight:800;text-transform:uppercase;}
.b-g{background:var(--gd);color:var(--good);}
.b-r{background:#FEE2E2;color:#DC2626;}
.b-a{background:#FEF3C7;color:#92400E;}
.b-b{background:var(--bd);color:var(--blue);}
.b-p{background:var(--purd);color:var(--pur);}
.b-x{background:var(--pd);color:var(--ink-f);}

/* Toggle */
.tog{width:40px;height:22px;background:var(--line);border-radius:999px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;}
.tog.on{background:var(--good);}
.tog::after{content:'';width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog.on::after{transform:translateX(18px);}

/* Chip */
.chip{padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:var(--pd);color:var(--ink-s);font-size:11px;font-weight:700;cursor:pointer;transition:all .1s;}
.chip.on{background:var(--ac);color:#fff;border-color:var(--ac);}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-f);border-bottom:1px solid var(--line);background:var(--pd);}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--line);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--pd);}

/* Overlay */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px 14px;}

/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:500px){.g3{grid-template-columns:repeat(4,1fr);}}
@media(max-width:480px){.g2{grid-template-columns:1fr;}}

/* Section title */
.st{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-f);margin-bottom:8px;}

/* Link box */
.lbx{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--pd);border:1px solid var(--line);border-radius:var(--r);font-size:11.5px;font-family:monospace;word-break:break-all;color:var(--ink);}

/* Plan banners */
.pl-free{background:var(--gd);border:1px solid #86EFAC;}
.pl-paid{background:var(--bd);border:1px solid #BFDBFE;}
.pl-exp{background:#FEF2F2;border:1px solid #FECACA;}
.pl-ban{padding:12px 16px;border-radius:var(--r2);display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}

/* Review */
.rv{padding:14px;border-bottom:1px solid var(--line);}
.rv:last-child{border-bottom:none;}
.stars{color:#F59E0B;}

/* Color picker input */
input[type=color]{padding:2px;height:36px;border-radius:6px;cursor:pointer;}

/* Section card */
.sec-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:12px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const FB={apiKey:"AIzaSyDoBNdJEAos6Ofj-KDzvarg_mH1Nz3nQls",authDomain:"hotel-radar-india.firebaseapp.com",databaseURL:"https://hotel-radar-india-default-rtdb.firebaseio.com",projectId:"hotel-radar-india",storageBucket:"hotel-radar-india.firebasestorage.app",messagingSenderId:"492786665359",appId:"1:492786665399:web:7033614463c044cf4fadfa"};
const SUPER_EMAIL="aryakaran836@gmail.com";
const AMENITIES=["AC","WiFi","Restaurant","Parking","Pool","Gym","Spa","Ganga View","Mountain View","Room Service","Laundry","Couple Friendly","Family Friendly","Hot Water","TV","Mini Bar","Balcony","Garden","Airport Shuttle","24/7 Reception"];
const URL_P=new URLSearchParams(location.search);
const HOTEL_EMAIL=URL_P.get('admin');
const IS_HOTEL=!!HOTEL_EMAIL;

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S={
  authReady:false,isAuth:false,user:null,
  tab:'dashboard',
  // super data
  hotels:[],sharedAdmins:[],payments:[],bookings:[],searchLogs:[],
  // hotel admin data
  myAdmin:null,myHotel:null,myBookings:[],myReviews:[],
  loading:true,
  // forms
  showHotelForm:false,editHotel:null,
  hf:eH(),hfErr:'',hfSaving:false,amenityInput:'',
  showShare:false,shareEmail:'',shareErr:'',shareSaving:false,genLink:'',
  showPayment:false,payOpt:'monthly',
  delId:null,delType:'',
  // website settings
  siteSettings:{
    heroTitle:'Find Your Perfect Stay',
    heroSubtitle:'India\'s trusted hotel directory — verified hotels, direct contact, zero commission.',
    heroGradient:'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
    accentColor:'#E8631C',
    siteName:'HotelRadar',
    whatsapp:'',
    email:'',
    phone:'',
    footerText:'Made with ❤️ in India',
    showBanner:true,
    bannerText:'🎉 New hotels added in Haridwar & Rishikesh!',
    maintenanceMode:false,
  },
  settingsSaving:false,
  // login
  lEmail:'',lPass:'',lErr:'',lLoading:false,lShowPass:false,gLoad:false,
  toast:null,
  hotelSearch:'',hotelFilter:'all',
};
function eH(){return{name:'',city:'',state:'',area:'',pin:'',phone:'',type:'hotel',price:'',rating:'4.5',reviewCount:'0',checkIn:'12:00 PM',checkOut:'11:00 AM',plan:'basic',emoji:'🏨',gradient:'linear-gradient(135deg,#E8631C,#F2A65A)',desc:'',amenities:[],badges:[],approved:false,active:true};}
// Input-only keys that should NOT trigger full re-render
const INPUT_KEYS=['lEmail','lPass','lShowPass','shareEmail','hotelSearch','amenityInput'];
function set(p,skipRender){
  S={...S,...p};
  if(skipRender)return;
  const keys=Object.keys(p);
  const onlyInputKeys=keys.every(k=>INPUT_KEYS.includes(k));
  if(!onlyInputKeys)render();
}
function setInput(p){S={...S,...p};} // update state only, no render
function sh(p){set({hf:{...S.hf,...p}});}
function ss(p){set({siteSettings:{...S.siteSettings,...p}});}

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
let db=null;
function initFB(){
  if(!firebase.apps.length)firebase.initializeApp(FB);
  db=firebase.database();
  firebase.auth().onAuthStateChanged(async u=>{
    if(!u){set({authReady:true,isAuth:false});return;}
    if(IS_HOTEL){
      const email=u.email,exp=decodeURIComponent(HOTEL_EMAIL);
      if(email.toLowerCase()!==exp.toLowerCase()){await firebase.auth().signOut();set({authReady:true,isAuth:false,lErr:`This panel is for: ${exp}`});return;}
      const key=email.replace(/\./g,'_');
      const snap=await db.ref(`sharedAdmins/${key}`).get();
      if(!snap.exists()){await firebase.auth().signOut();set({authReady:true,isAuth:false,lErr:'Access not granted. Contact HotelRadar admin.'});return;}
      const ad=snap.val();
      set({authReady:true,isAuth:true,user:u,myAdmin:{...ad,key}});
      loadHotelData(email,key,ad);
    } else {
      if(u.email!==SUPER_EMAIL){await firebase.auth().signOut();set({authReady:true,isAuth:false,lErr:'Access denied. Only Super Admin can login here.'});return;}
      set({authReady:true,isAuth:true,user:u});
      loadSuperData();
    }
  });
}

function loadSuperData(){
  db.ref('hotels').on('value',s=>{
    const d=s.val();if(!d){set({hotels:[],loading:false});return;}
    const l=Array.isArray(d)?d.filter(Boolean):Object.keys(d).map(k=>({...d[k],id:d[k].id||k}));
    set({hotels:l,loading:false});
  });
  db.ref('sharedAdmins').on('value',s=>{const d=s.val();if(!d){set({sharedAdmins:[]});return;}set({sharedAdmins:Object.keys(d).map(k=>({...d[k],key:k}))});});
  db.ref('payments').on('value',s=>{const d=s.val();if(!d){set({payments:[]});return;}set({payments:Object.keys(d).map(k=>({...d[k],id:k}))});});
  db.ref('bookings').on('value',s=>{const d=s.val();if(!d){set({bookings:[]});return;}set({bookings:Object.keys(d).map(k=>({...d[k],id:k}))});});
  db.ref('searchLogs').limitToLast(300).on('value',s=>{const d=s.val();if(!d){set({searchLogs:[]});return;}set({searchLogs:Object.keys(d).map(k=>({...d[k],id:k})).reverse()});});
  db.ref('siteSettings').get().then(s=>{if(s.exists())set({siteSettings:{...S.siteSettings,...s.val()}});});
}

function loadHotelData(email,key,ad){
  db.ref('hotels').on('value',s=>{
    const d=s.val();if(!d){set({myHotel:null,loading:false});return;}
    const all=Array.isArray(d)?d.filter(Boolean):Object.keys(d).map(k=>({...d[k],id:d[k].id||k}));
    const mine=all.find(h=>h.ownerEmail===email||h.id===ad.hotelId)||null;
    set({myHotel:mine,loading:false,hf:mine?{...mine,price:String(mine.price||''),rating:String(mine.rating||'4.5'),reviewCount:String(mine.reviewCount||0)}:eH()});
  });
  db.ref('bookings').on('value',s=>{
    const d=s.val();if(!d){set({myBookings:[]});return;}
    const all=Object.keys(d).map(k=>({...d[k],id:k}));
    set({myBookings:all.filter(b=>b.hotelId===ad.hotelId||b.ownerEmail===email)});
  });
  db.ref(`reviews/${ad.hotelId||key}`).on('value',s=>{
    const d=s.val();if(!d){set({myReviews:[]});return;}
    set({myReviews:Object.keys(d).map(k=>({...d[k],id:k})).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))});
  });
}

async function doLogin(){
  if(S.lLoading)return;set({lLoading:true,lErr:''});
  try{await firebase.auth().signInWithEmailAndPassword(S.lEmail,S.lPass);}
  catch(e){const c=e.code||'';set({lLoading:false,lErr:c==='auth/wrong-password'||c==='auth/user-not-found'||c==='auth/invalid-credential'?'Invalid email or password.':e.message||'Login failed.'});}
}
async function doGoogle(){
  set({gLoad:true,lErr:''});
  try{const p=new firebase.auth.GoogleAuthProvider();p.setCustomParameters({prompt:'select_account'});await firebase.auth().signInWithPopup(p);}
  catch(e){set({gLoad:false,lErr:'Google sign-in failed. Try again.'});}
}
async function doSignOut(){await firebase.auth().signOut();set({isAuth:false,user:null,tab:'dashboard'});}

// Hotel ops
async function saveHotel(){
  if(!S.hf.name?.trim()){set({hfErr:'Hotel name required'});return;}
  if(!S.hf.city?.trim()){set({hfErr:'City required'});return;}
  if(!S.hf.phone?.trim()){set({hfErr:'Phone required'});return;}
  if(!S.hf.price||Number(S.hf.price)<=0){set({hfErr:'Valid price required'});return;}
  set({hfSaving:true,hfErr:''});
  try{
    const existId=S.editHotel?.id||(IS_HOTEL?S.myAdmin?.hotelId:null);
    const id=existId||('h'+Date.now());
    const h={...S.hf,id,price:Number(S.hf.price)||0,rating:Number(S.hf.rating)||4.5,reviewCount:Number(S.hf.reviewCount)||0,createdAt:existId?(S.editHotel?.createdAt||new Date().toISOString()):new Date().toISOString()};
    if(IS_HOTEL){h.ownerEmail=S.user.email;await db.ref(`sharedAdmins/${S.myAdmin.key}`).update({hotelId:id});}
    await db.ref(`hotels/${id}`)[existId?'update':'set'](h);
    toast(existId?'Hotel updated!':'Hotel added!');
    set({showHotelForm:false,editHotel:null,hfSaving:false});
  }catch(e){set({hfErr:e.message||'Save failed',hfSaving:false});}
}
async function delHotel(id){await db.ref(`hotels/${id}`).remove();set({delId:null});toast('Hotel deleted.');}
async function togF(id,f,v){await db.ref(`hotels/${id}`).update({[f]:v});}
async function shareAdmin(){
  const email=S.shareEmail.trim().toLowerCase();
  if(!email.includes('@')){set({shareErr:'Enter valid Gmail.'});return;}
  if(S.sharedAdmins.find(a=>a.email===email)){set({shareErr:'Already has access.'});return;}
  set({shareSaving:true,shareErr:''});
  try{
    const key=email.replace(/\./g,'_');
    await db.ref(`sharedAdmins/${key}`).set({email,addedAt:new Date().toISOString(),addedBy:S.user.email,active:true,plan:'free',planExpiry:new Date(Date.now()+30*864e5).toISOString()});
    const link=`${location.origin}${location.pathname}?admin=${encodeURIComponent(email)}`;
    set({shareSaving:false,shareEmail:'',genLink:link});
    toast('Access shared! Link generated.');
  }catch(e){set({shareSaving:false,shareErr:e.message||'Failed.'});}
}
async function revokeAdmin(key){await db.ref(`sharedAdmins/${key}`).remove();toast('Access revoked.');}
async function markPaid(key){
  const expiry=new Date(Date.now()+30*864e5).toISOString(),now=new Date().toISOString();
  await db.ref(`sharedAdmins/${key}`).update({plan:'paid',planExpiry:expiry,lastPaid:now});
  await db.ref(`payments/pay_${Date.now()}`).set({adminEmail:key,amount:999,date:now,status:'paid',plan:'monthly'});
  toast('Payment marked. Plan extended 30 days.');
}
async function saveSiteSettings(){
  set({settingsSaving:true});
  try{await db.ref('siteSettings').set(S.siteSettings);toast('Website settings saved!');}
  catch(e){toast('Save failed: '+e.message,'err');}
  set({settingsSaving:false});
}
async function delReview(id){
  const k=S.myAdmin.hotelId||S.myAdmin.key;
  await db.ref(`reviews/${k}/${id}`).remove();
  set({delId:null,delType:''});toast('Review removed.');
}
async function updBooking(id,status){await db.ref(`bookings/${id}`).update({status});toast('Booking '+status+'!');}
async function delBooking(id){await db.ref(`bookings/${id}`).remove();set({delId:null,delType:''});toast('Booking removed.');}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function toast(msg,t='ok'){set({toast:{msg,t}});setTimeout(()=>set({toast:null}),3500);}
function el(tag,a,...c){
  const e=document.createElement(tag);
  if(a)Object.keys(a).forEach(k=>{
    if(k==='class')e.className=a[k];
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),a[k]);
    else if(k==='style'&&typeof a[k]==='object')Object.assign(e.style,a[k]);
    else if(['checked','disabled','selected','value'].includes(k))e[k]=a[k];
    else e.setAttribute(k,a[k]);
  });
  c.flat(9).forEach(ch=>{if(ch==null||ch===false)return;e.appendChild(typeof ch==='string'||typeof ch==='number'?document.createTextNode(String(ch)):ch);});
  return e;
}
function svg(paths,sz=16){
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('width',sz);s.setAttribute('height',sz);s.setAttribute('viewBox','0 0 24 24');
  s.setAttribute('fill','none');s.setAttribute('stroke','currentColor');s.setAttribute('stroke-width','2');
  s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');
  paths.forEach(d=>{const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);s.appendChild(p);});
  return s;
}
const IC={
  dash:['M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z'],
  hotel:['M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z','M9 22V12h6v10'],
  money:['M12 1v22','M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6'],
  users:['M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2','M23 21v-2a4 4 0 00-3-3.87','M16 3.13a4 4 0 010 7.75','M9 7a4 4 0 100 8 4 4 0 000-8z'],

function getMyPlan(){
  const a=S.myAdmin;if(!a)return{st:'none',label:'No Plan',days:0};
  if(!a.planExpiry)return{st:'free',label:'Free Trial',days:30};
  const days=Math.ceil((new Date(a.planExpiry)-new Date())/(864e5));
  if(days<=0)return{st:'expired',label:'Expired',days:0};
  return{st:a.plan==='paid'?'paid':'free',label:a.plan==='paid'?'Paid Plan':'Free Trial',days};
}

          el('label',{style:{display:'flex',alignItems:'center',gap:'7px',cursor:'pointer'}},el('div',{class:'tog'+(f.approved?' on':''),onClick:()=>sh({approved:!f.approved})}),el('span',{style:{fontSize:'12px',fontWeight:'600'}},'Approved')),
          el('label',{style:{display:'flex',alignItems:'center',gap:'7px',cursor:'pointer'}},el('div',{class:'tog'+(f.active?' on':''),onClick:()=>sh({active:!f.active})}),el('span',{style:{fontSize:'12px',fontWeight:'600'}},'Active'))
        )
      ),
      el('div',{style:{display:'flex',gap:'9px',padding:'12px 18px',borderTop:'1px solid var(--line)'}},
        el('button',{class:'btn bo',style:{flex:1,justifyContent:'center'},onClick:()=>set({showHotelForm:false,editHotel:null})},'Cancel'),
        el('button',{class:'btn ba',style:{flex:1,justifyContent:'center'},disabled:S.hfSaving,onClick:saveHotel},S.hfSaving?sp():ic('save',13),S.hfSaving?'Saving...':'Save Hotel')
      )
    )
  );
}

// ══════════════════════════════════════════
// SHARE MODAL
// ══════════════════════════════════════════
function renderShareModal(){
  return el('div',{class:'ov',style:{alignItems:'center'},onClick:e=>e.target.classList.contains('ov')&&set({showShare:false})},
    el('div',{style:{width:'100%',maxWidth:'400px',background:'var(--card)',borderRadius:'20px',padding:'22px',boxShadow:'var(--s3)',border:'1px solid var(--line)'},class:'fi'},
      el('h3',{style:{fontSize:'16px',color:'var(--ink)',marginBottom:'5px'}},'Share Hotel Admin Access'),
      el('p',{style:{fontSize:'12px',color:'var(--ink-s)',marginBottom:'14px',lineHeight:'1.6'}},'Enter hotel owner Gmail → A unique link is generated → Share link → They login and see their panel.'),
      S.shareErr?el('div',{style:{display:'flex',alignItems:'center',gap:'6px',padding:'8px 12px',background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',marginBottom:'10px',fontSize:'12px',color:'#DC2626'}},ic('warn',12),S.shareErr):null,
      lbl('Hotel Owner Gmail *'),
      el('input',{class:'inp',type:'email',placeholder:'owner@gmail.com',value:S.shareEmail,style:{marginBottom:'12px'},onInput:e=>setInput({shareEmail:e.target.value}),onKeydown:e=>e.key==='Enter'&&shareAdmin()}),
      S.genLink?el('div',{style:{marginBottom:'12px'}},
        el('p',{style:{fontSize:'10px',fontWeight:'700',color:'var(--good)',marginBottom:'5px'}},'✅ Link generated! Share with hotel owner:'),
        el('div',{class:'lbx'},el('span',{style:{flex:1,wordBreak:'break-all'}},S.genLink),
          el('button',{style:{flexShrink:0,display:'flex',alignItems:'center',gap:'3px',padding:'5px 9px',background:'var(--ac)',color:'#fff',fontWeight:'700',fontSize:'11px',borderRadius:'6px'},onClick:()=>{navigator.clipboard.writeText(S.genLink);toast('Copied!');}},ic('copy',11),'Copy')
        )
      ):null,
      el('div',{style:{display:'flex',gap:'8px'}},
        el('button',{class:'btn bo',style:{flex:1,justifyContent:'center'},onClick:()=>set({showShare:false})},'Close'),
        el('button',{class:'btn ba',style:{flex:1,justifyContent:'center'},disabled:S.shareSaving,onClick:shareAdmin},S.shareSaving?sp():ic('share',13),S.shareSaving?'Generating...':'Generate Link')
      )
    )
  );
}

// ══════════════════════════════════════════
// PAYMENT MODAL
// ══════════════════════════════════════════
function renderPaymentModal(){
  return el('div',{class:'ov',style:{alignItems:'center'},onClick:e=>e.target.classList.contains('ov')&&set({showPayment:false})},
    el('div',{style:{width:'100%',maxWidth:'360px',background:'var(--card)',borderRadius:'20px',padding:'22px',boxShadow:'var(--s3)',border:'1px solid var(--line)'},class:'fi'},
      el('h3',{style:{fontSize:'16px',color:'var(--ink)',marginBottom:'5px'}},'Upgrade Plan'),
      el('p',{style:{fontSize:'12px',color:'var(--ink-s)',marginBottom:'14px',lineHeight:'1.6'}},'Contact HotelRadar to activate. We will confirm within minutes.'),
      el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'14px'}},
        ...[{v:'monthly',p:'₹999/mo',l:'Monthly Plan',d:'Unlimited bookings',c:'var(--good)',bg:'var(--gd)'},
            {v:'perbooking',p:'₹49/booking',l:'Per Booking',d:'Pay only when you earn',c:'var(--blue)',bg:'var(--bd)'}].map(o=>
          el('div',{style:{padding:'12px',background:o.bg,border:'2px solid '+(S.payOpt===o.v?o.c:'var(--line)'),borderRadius:'10px',cursor:'pointer'},onClick:()=>set({payOpt:o.v})},
            el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
              el('div',{},el('p',{style:{fontWeight:'700',fontSize:'13px',color:'var(--ink)'}},o.l),el('p',{style:{fontSize:'11px',color:'var(--ink-s)'}},o.d)),
              el('p',{style:{fontSize:'17px',fontWeight:'700',color:o.c,fontFamily:'Fraunces,serif'}},o.p)
            )
          )
        )
      ),
      el('a',{href:'https://wa.me/919876543210?text=Hi+HotelRadar%2C+I+want+to+activate+'+encodeURIComponent(S.payOpt==='monthly'?'Monthly Plan ₹999':'Per Booking ₹49'),target:'_blank',style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',width:'100%',padding:'11px',background:'#25D366',color:'#fff',fontWeight:'700',fontSize:'13px',borderRadius:'8px',textDecoration:'none',marginBottom:'7px'}},'💬 Contact on WhatsApp'),
      el('button',{class:'btn bo btn-w',onClick:()=>set({showPayment:false})},'Close')
    )
  );
}

// ══════════════════════════════════════════
// CONFIRM DELETE
// ══════════════════════════════════════════
function renderConfirm(){
  const titles={hotel:'Delete Hotel?',review:'Remove Review?',booking:'Remove Booking?'};
  return el('div',{class:'ov',style:{alignItems:'center'},onClick:e=>e.target.classList.contains('ov')&&set({delId:null,delType:''})},
    el('div',{style:{width:'100%',maxWidth:'310px',background:'var(--card)',borderRadius:'18px',padding:'22px',textAlign:'center',boxShadow:'var(--s3),border:1px solid var(--line)'},class:'fi'},
      el('div',{style:{width:'44px',height:'44px',borderRadius:'50%',background:'#FEF2F2',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',color:'#EF4444'}},ic('trash',20)),
      el('h3',{style:{fontSize:'15px',color:'var(--ink)',marginBottom:'5px'}},titles[S.delType]||'Delete?'),
      el('p',{style:{fontSize:'12px',color:'var(--ink-s)',marginBottom:'18px'}},'This cannot be undone.'),
      el('div',{style:{display:'flex',gap:'8px'}},
        el('button',{class:'btn bo',style:{flex:1,justifyContent:'center'},onClick:()=>set({delId:null,delType:''})},'Cancel'),
        el('button',{class:'btn br',style:{flex:1,justifyContent:'center'},onClick:async()=>{
          if(S.delType==='hotel')await delHotel(S.delId);
          else if(S.delType==='review')await delReview(S.delId);
          else if(S.delType==='booking')await delBooking(S.delId);
        }},ic('trash',13),'Delete')
      )
    )
  );
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function renderToast(){
  if(!S.toast)return null;
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:${S.toast.t==='err'?'#EF4444':'#1F7A4D'};color:#fff;padding:9px 18px;border-radius:999px;font-size:12px;font-weight:700;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap`;
  d.textContent=S.toast.msg;
  return d;
}

// ══════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(!S.authReady){const d=document.createElement('div');d.style.cssText='min-height:100vh;display:flex;align-items:center;justify-content:center;';d.appendChild(sp2());app.appendChild(d);return;}
  if(!S.isAuth){app.appendChild(renderLogin());if(S.toast)app.appendChild(renderToast());return;}

  if(IS_HOTEL){
    // ── HOTEL OWNER PANEL ──
    app.appendChild(renderMobTop());
    // tab content
    const content=
      S.tab==='dashboard'?renderDashH():
      S.tab==='hotel'?renderHotelH():
      S.tab==='bookings'?renderBookingsH():
      S.tab==='reviews'?renderReviewsH():
      S.tab==='plan'?renderPlanH():
      renderSettingsH();
    app.appendChild(content);
    app.appendChild(renderMobNav());
  } else {
    // ── SUPER ADMIN PANEL ──
    const layout=el('div',{class:'layout'},
      renderSidebar(),
      el('div',{class:'main'},
        renderTopbar(),
        renderMobTop(),
        S.tab==='dashboard'?renderDashS():
        S.tab==='hotels'?renderHotelsS():
        S.tab==='payments'?renderPaymentsS():
        S.tab==='admins'?renderAdminsS():
        S.tab==='share'?renderShareS():
        S.tab==='analytics'?renderAnalyticsS():
        S.tab==='bookings'?renderBookingsS():
        S.tab==='website'?renderWebsiteS():
        S.tab==='activity'?renderActivityS():
        el('div',{class:'content'},'')
      )
    );
    app.appendChild(layout);
    app.appendChild(renderMobNav());
  }

  // Modals
  if(S.showHotelForm||S.editHotel)app.appendChild(renderHotelForm());
  if(S.showShare)app.appendChild(renderShareModal());
  if(S.showPayment)app.appendChild(renderPaymentModal());
  if(S.delId)app.appendChild(renderConfirm());
  if(S.toast)app.appendChild(renderToast());
}

window.addEventListener('load',()=>{render();initFB();});
</script>
</body>
</html>
